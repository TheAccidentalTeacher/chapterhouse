<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chapterhouse — Test Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:#1e293b;border-bottom:2px solid #6366f1;padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:1.1rem;font-weight:700;color:#a5b4fc;white-space:nowrap}
.bar-wrap{flex:1;min-width:150px;background:#334155;border-radius:999px;height:10px}
.bar{height:10px;border-radius:999px;background:linear-gradient(90deg,#6366f1,#22d3ee);transition:width .3s}
.lbl{font-size:.78rem;color:#94a3b8;white-space:nowrap}
.btns{display:flex;gap:6px}
.btns button,.rst{padding:4px 11px;border-radius:6px;font-size:.78rem;cursor:pointer;border:1px solid #334155;background:transparent;color:#94a3b8}
.btns button.on{background:#6366f1;color:#fff;border-color:#6366f1}
.rst{border-color:#ef4444;color:#ef4444}
main{max-width:860px;margin:0 auto;padding:20px 14px}
.sec{margin-bottom:22px;background:#1e293b;border-radius:10px;overflow:hidden;border:1px solid #334155}
.sec-h{padding:11px 15px;background:#293548;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.sec-t{font-size:.9rem;font-weight:600;color:#cbd5e1}
.sec-c{font-size:.72rem;color:#64748b}
.row{display:flex;align-items:flex-start;gap:11px;padding:9px 15px;border-bottom:1px solid #1a2535;cursor:pointer;transition:background .12s}
.row:last-child{border-bottom:none}
.row:hover{background:#243045}
.row.done{opacity:.45}
.row input{margin-top:2px;accent-color:#6366f1;width:15px;height:15px;flex-shrink:0;cursor:pointer}
.row span{font-size:.84rem;line-height:1.5;color:#cbd5e1}
.row.done span{text-decoration:line-through;color:#475569}
.future .sec-h{background:#1a2535;border-left:3px solid #22d3ee}
.future .sec-t{color:#67e8f9}
.empty{padding:11px 15px;color:#475569;font-size:.8rem}
</style>
</head>
<body>
<header>
  <h1>⚙ Chapterhouse Test Checklist</h1>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
  <span class="lbl" id="lbl">0 / 0</span>
  <div class="btns">
    <button class="on" onclick="setF('all')">All</button>
    <button onclick="setF('todo')">To Do</button>
    <button onclick="setF('done')">Done</button>
  </div>
  <button class="rst" onclick="if(confirm('Reset all?')){save({});render()}">Reset</button>
</header>
<main id="main"></main>

const ALL=[...S.map(s=>({...s,f:false})),...FUTURE.map(s=>({...s,f:true}))];
let filt='all';
function load(){return JSON.parse(localStorage.getItem('ch_v1')||'{}')}
function save(st){localStorage.setItem('ch_v1',JSON.stringify(st))}
function setF(f){filt=f;document.querySelectorAll('.btns button').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.btns button').forEach(b=>{if(b.textContent.toLowerCase().startsWith(f[0]))b.classList.add('on')});render()}
function toggle(id){const st=load();st[id]=!st[id];save(st);render()}
function render(){
  const st=load();
  let total=0,done=0,html='';
  ALL.forEach((sec,si)=>{
    let rows='',sc=0,st2=0;
    sec.i.forEach((label,ii)=>{
      const id='i'+si+'_'+ii;
      const ck=!!st[id];
      total++;if(ck)done++;sc++;if(ck)st2++;
      if(filt==='todo'&&ck)return;
      if(filt==='done'&&!ck)return;
      rows+=`<div class="row${ck?' done':''}" onclick="toggle('${id}')"><input type="checkbox" ${ck?'checked':''} onclick="event.stopPropagation();toggle('${id}')"><span>${label}</span></div>`;
    });
    if(!rows&&filt!=='all')return;
    html+=`<div class="sec${sec.f?' future':''}"><div class="sec-h"><span class="sec-t">${sec.t}</span><span class="sec-c">${st2}/${sc}</span></div><div class="sec-b">${rows||'<div class="empty">All done ✓</div>'}</div></div>`;
  });
  document.getElementById('main').innerHTML=html;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('bar').style.width=pct+'%';
  document.getElementById('lbl').textContent=done+' / '+total+' ('+pct+'%)';
}
render();
</script>

</html>
